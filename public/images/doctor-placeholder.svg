<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-label="Doctor placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#F4F7FF"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
  </defs>

  <rect width="240" height="240" rx="120" fill="url(#bg)"/>

  <!-- shoulders/coat -->
  <path d="M48 206c10-46 45-70 72-70h0c27 0 62 24 72 70" fill="url(#coat)" stroke="#BFD5FF" stroke-width="3" stroke-linecap="round"/>

  <!-- neck -->
  <path d="M104 132c6 10 26 10 32 0v-12h-32v12z" fill="#FFD7C2" stroke="#F3B9A2" stroke-width="2"/>

  <!-- head -->
  <circle cx="120" cy="92" r="44" fill="#FFD7C2" stroke="#F3B9A2" stroke-width="3"/>

  <!-- hair -->
  <path d="M78 94c2-30 22-54 52-54s50 24 52 54c-10-14-24-20-52-20s-42 6-52 20z" fill="#1F2A44" opacity="0.92"/>

  <!-- stethoscope -->
  <path d="M94 162c0 18 12 30 26 30s26-12 26-30" fill="none" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <circle cx="120" cy="198" r="10" fill="#2563EB" opacity="0.95"/>

  <!-- plus badge -->
  <circle cx="176" cy="66" r="20" fill="#2563EB" opacity="0.95"/>
  <path d="M176 56v20M166 66h20" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
</svg>
